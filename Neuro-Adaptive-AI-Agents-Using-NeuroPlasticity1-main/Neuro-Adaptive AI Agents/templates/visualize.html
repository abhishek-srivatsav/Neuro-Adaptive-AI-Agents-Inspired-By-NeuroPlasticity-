<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Input Modality Visualization</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background-color: #0e1117;
    color: #fff;
    text-align: center;
    padding: 2rem;
}
.plot-container img {
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
    width: 60%;
    margin-top: 2rem;
}
.caption-box {
    background-color: #1a1f26;
    padding: 1rem;
    border-radius: 10px;
    margin: 1rem auto;
    width: 60%;
    text-align: left;
}
a.btn-back {
    margin-top: 2rem;
}
</style>
</head>
<body>
<h2>🧭 3D Modality Space Visualization</h2>
<div class="plot-container">
    <img src="{{ plot_url }}" alt="3D Modality Visualization">
</div>

<div class="caption-box">
    <h5>🖼️ Image Caption:</h5>
    <p>{{ image_caption }}</p>
    <h5>🎵 Audio Transcript:</h5>
    <p>{{ audio_transcript }}</p>
    <h5>💬 Text Input:</h5>
    <p>{{ text_query }}</p>
</div>

<a href="{{ url_for('start_system') }}" class="btn btn-outline-info btn-back">⬅ Back to System</a>
</body>
</html>
