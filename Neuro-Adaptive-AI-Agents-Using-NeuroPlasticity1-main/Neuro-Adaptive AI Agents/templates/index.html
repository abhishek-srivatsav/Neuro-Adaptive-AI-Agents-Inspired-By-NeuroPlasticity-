<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro-Adaptive Multi-Agent System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background-color: #0e1117;
    color: #fff;
    font-family: "Segoe UI", sans-serif;
}
.container-box {
    margin-top: 2rem;
}
.agent-card {
    background-color: #1c1f26;
    border-radius: 12px;
    padding: 1.5rem;
    min-height: 600px;
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
}
.agent-header {
    font-weight: 600;
    color: #00c3ff;
    margin-bottom: 0.5rem;
}
textarea {
    background: #12151b;
    color: #fff;
    border: 1px solid #333;
    width: 100%;
    border-radius: 8px;
    padding: 10px;
    resize: none;
}
.audio-player {
    margin-top: 10px;
    width: 100%;
}
.feedback-box {
    margin-top: 10px;
}
button {
    background-color: #00c3ff;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    cursor: pointer;
}
button:hover {
    background-color: #00a0d4;
}
.preview-box {
    margin-top: 1rem;
    text-align: center;
}
.preview-img {
    max-width: 100%;
    border-radius: 10px;
    margin-top: 10px;
    border: 1px solid #333;
}
#pcaFrame, #reasoningFrame {
    display: none;
    margin-top: 2rem;
}
</style>
</head>

<body>
<div class="container container-box">
    <h2 class="text-center mb-4">🧠 Neuro-Adaptive Multi-Agent Intelligence</h2>

    <!-- Common Input Form -->
    <form id="commonForm" enctype="multipart/form-data">
        <div class="row mb-4">
            <div class="col-md-4">
                <label>Text Input</label>
                <textarea name="text_input" rows="4" placeholder="Enter your question or statement..."></textarea>
            </div>
            <div class="col-md-4">
                <label>Upload Image</label>
                <input type="file" id="image_file" name="image_file" accept="image/*" class="form-control mb-2" onchange="previewImage(event)">
                <div id="imagePreview" class="preview-box"></div>

                <label>Upload Audio</label>
                <input type="file" id="audio_file" name="audio_file" accept="audio/*" class="form-control" onchange="previewAudio(event)">
                <div id="audioPreview" class="preview-box"></div>
            </div>
        </div>
    </form>

    <!-- 3D Input Visualization Section -->
    <div class="text-center mt-3">
        <button class="btn btn-info" onclick="generate3D()">🧩 Generate Input 3D Visualization</button>
    </div>

    <div id="pcaFrame" class="mt-4 text-center">
        <iframe id="pcaIframe" src="" width="100%" height="600" style="border:none;"></iframe>
    </div>

    <hr class="my-4" style="border-color:#333;">

    <!-- Multi-Agent Reasoning Cards -->
    <div class="row">
        <div class="col-md-4">
            <div class="agent-card">
                <div class="agent-header">🤖 NORMAL AGENT</div>
                <button class="w-100 mb-3" onclick="runAgent('normal')">Run Normal Agent</button>
                <pre id="normalReasoning"></pre>
            </div>
        </div>

        <div class="col-md-4">
            <div class="agent-card">
                <div class="agent-header">👁️‍🗨️ BLIND AGENT</div>
                <button class="w-100 mb-3" onclick="runAgent('blind')">Run Blind Agent</button>
                <pre id="blindReasoning"></pre>
            </div>
        </div>

        <div class="col-md-4">
            <div class="agent-card">
                <div class="agent-header">🤫 MUTE AGENT</div>
                <button class="w-100 mb-3" onclick="runAgent('mute')">Run Mute Agent</button>
                <pre id="muteReasoning"></pre>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <button class="btn btn-success" onclick="generateReasoningGraph()">📊 Generate Reasoning Graph</button>
    </div>

    <div id="reasoningFrame" class="mt-4 text-center">
        <iframe id="reasoningIframe" src="" width="100%" height="600" style="border:none;"></iframe>
    </div>
</div>

<script>
let reasoningTexts = { normal: "", blind: "", mute: "" };

// === Image Preview ===
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("imagePreview");
    if (!file) return (preview.innerHTML = "");
    const reader = new FileReader();
    reader.onload = e => {
        preview.innerHTML = `<p>🖼️ <strong>Selected Image:</strong></p><img src="${e.target.result}" class="preview-img">`;
    };
    reader.readAsDataURL(file);
}

// === Audio Preview ===
function previewAudio(event) {
    const file = event.target.files[0];
    const preview = document.getElementById("audioPreview");
    if (!file) return (preview.innerHTML = "");
    const reader = new FileReader();
    reader.onload = e => {
        preview.innerHTML = `
            <p>🎵 <strong>Selected Audio:</strong></p>
            <audio controls class="audio-player">
                <source src="${e.target.result}" type="${file.type}">
            </audio>`;
    };
    reader.readAsDataURL(file);
}

// === Generate Input 3D ===
async function generate3D() {
    const formData = new FormData(document.getElementById("commonForm"));
    try {
        const res = await fetch("/generate_3d", { method: "POST", body: formData });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        const iframe = document.getElementById("pcaIframe");
        iframe.src = data.plot_url;
        document.getElementById("pcaFrame").style.display = "block";
    } catch (err) {
        console.error(err);
        alert("Failed to generate input 3D visualization.");
    }
}

// === Run Agent ===
async function runAgent(agentType) {
    const formData = new FormData(document.getElementById("commonForm"));
    formData.set("agent_type", agentType);
    try {
        const res = await fetch("/run_agent", { method: "POST", body: formData });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        // Save reasoning text globally
        reasoningTexts = data.reasoning_texts;

        document.getElementById("normalReasoning").textContent = data.reasoning_texts.normal;
        document.getElementById("blindReasoning").textContent = data.reasoning_texts.blind;
        document.getElementById("muteReasoning").textContent = data.reasoning_texts.mute;

        alert("✅ Reasoning generated! Now click 'Generate Reasoning Graph' to visualize.");
    } catch (err) {
        console.error(err);
        alert("Failed to run agent reasoning.");
    }
}

// === Generate Reasoning Graph ===
async function generateReasoningGraph() {
    try {
        const res = await fetch("/generate_reasoning_graph", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(reasoningTexts)
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const iframe = document.getElementById("reasoningIframe");
        iframe.src = data.reasoning_plot;
        document.getElementById("reasoningFrame").style.display = "block";

        alert(`✅ Reasoning Graph Generated!\nClosest Alignment: ${data.closest_agent}`);
    } catch (err) {
        console.error(err);
        alert("Failed to generate reasoning graph.");
    }
}
</script>
</body>
</html>
